<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>变量选择配置弹窗</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 h-screen w-full flex items-center justify-center p-4">
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity z-10 flex items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="relative w-full max-w-[1200px] h-[90vh] bg-white dark:bg-slate-900 rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="px-6 py-5 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/50">
<div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">配置分析变量</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">从左侧选择变量并将其分配给模型参数。</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="flex-1 overflow-hidden p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 bg-white dark:bg-slate-900">
<div class="lg:col-span-4 flex flex-col h-full min-h-0">
<div class="flex items-center justify-between mb-3">
<h3 class="font-semibold text-slate-800 dark:text-slate-200 text-sm uppercase tracking-wide">待选变量</h3>
<span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">5</span>
</div>
<div class="relative mb-3">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
<span class="material-symbols-outlined text-[20px]">search</span>
</span>
<input class="w-full pl-9 pr-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100" placeholder="搜索变量..." type="text"/>
</div>
<div class="flex-1 overflow-y-auto border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50/50 dark:bg-slate-900/50">
<div class="divide-y divide-slate-100 dark:divide-slate-800">
<label class="flex items-center p-3 hover:bg-white dark:hover:bg-slate-800 transition-colors cursor-pointer group select-none">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800" type="checkbox"/>
<div class="ml-3 flex-1">
<div class="flex items-center justify-between">
<p class="text-sm font-medium text-slate-700 dark:text-slate-200">Age</p>
<span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded uppercase">Num</span>
</div>
<p class="text-xs text-slate-400 mt-0.5 truncate">Participant age in years</p>
</div>
</label>
<label class="flex items-center p-3 hover:bg-white dark:hover:bg-slate-800 transition-colors cursor-pointer group select-none bg-primary/5 dark:bg-primary/10">
<input checked="" class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800" type="checkbox"/>
<div class="ml-3 flex-1">
<div class="flex items-center justify-between">
<p class="text-sm font-medium text-slate-900 dark:text-white">Gender</p>
<span class="text-[10px] font-bold text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/30 px-1.5 py-0.5 rounded uppercase">Cat</span>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate">Self-identified gender</p>
</div>
</label>
<label class="flex items-center p-3 hover:bg-white dark:hover:bg-slate-800 transition-colors cursor-pointer group select-none">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800" type="checkbox"/>
<div class="ml-3 flex-1">
<div class="flex items-center justify-between">
<p class="text-sm font-medium text-slate-700 dark:text-slate-200">Treatment_Group</p>
<span class="text-[10px] font-bold text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/30 px-1.5 py-0.5 rounded uppercase">Cat</span>
</div>
<p class="text-xs text-slate-400 mt-0.5 truncate">Control vs Experimental</p>
</div>
</label>
<label class="flex items-center p-3 hover:bg-white dark:hover:bg-slate-800 transition-colors cursor-pointer group select-none">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800" type="checkbox"/>
<div class="ml-3 flex-1">
<div class="flex items-center justify-between">
<p class="text-sm font-medium text-slate-700 dark:text-slate-200">Score_A</p>
<span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded uppercase">Num</span>
</div>
<p class="text-xs text-slate-400 mt-0.5 truncate">Pre-test assessment score</p>
</div>
</label>
<label class="flex items-center p-3 hover:bg-white dark:hover:bg-slate-800 transition-colors cursor-pointer group select-none">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800" type="checkbox"/>
<div class="ml-3 flex-1">
<div class="flex items-center justify-between">
<p class="text-sm font-medium text-slate-700 dark:text-slate-200">Score_B</p>
<span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded uppercase">Num</span>
</div>
<p class="text-xs text-slate-400 mt-0.5 truncate">Post-test assessment score</p>
</div>
</label>
</div>
</div>
</div>
<div class="lg:col-span-1 flex lg:flex-col flex-row items-center justify-center gap-4 py-2">
<div class="flex flex-col gap-2">
<button class="h-10 w-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-primary hover:border-primary dark:hover:border-primary dark:hover:text-primary shadow-sm hover:shadow transition-all group" title="Move to Factors">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform hidden lg:block">chevron_right</span>
<span class="material-symbols-outlined group-hover:scale-110 transition-transform lg:hidden block">expand_more</span>
</button>
<button class="h-10 w-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-red-500 hover:border-red-500 dark:hover:border-red-500 dark:hover:text-red-500 shadow-sm hover:shadow transition-all group" title="Remove">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform hidden lg:block">chevron_left</span>
<span class="material-symbols-outlined group-hover:scale-110 transition-transform lg:hidden block">expand_less</span>
</button>
</div>
<div class="h-px w-full bg-slate-200 dark:bg-slate-700 my-4 hidden lg:block"></div>
<div class="flex flex-col gap-2">
<button class="h-10 w-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-primary hover:border-primary dark:hover:border-primary dark:hover:text-primary shadow-sm hover:shadow transition-all group" title="Move to Targets">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform hidden lg:block">chevron_right</span>
<span class="material-symbols-outlined group-hover:scale-110 transition-transform lg:hidden block">expand_more</span>
</button>
<button class="h-10 w-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-red-500 hover:border-red-500 dark:hover:border-red-500 dark:hover:text-red-500 shadow-sm hover:shadow transition-all group" title="Remove">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform hidden lg:block">chevron_left</span>
<span class="material-symbols-outlined group-hover:scale-110 transition-transform lg:hidden block">expand_less</span>
</button>
</div>
</div>
<div class="lg:col-span-7 flex flex-col h-full min-h-0 gap-6">
<div class="flex-1 flex flex-col min-h-0">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-2">
<div class="bg-primary/10 p-1 rounded">
<span class="material-symbols-outlined text-primary text-sm">category</span>
</div>
<h3 class="font-semibold text-slate-800 dark:text-slate-200 text-sm uppercase tracking-wide">因子 (分类变量)</h3>
</div>
<span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">0 已选</span>
</div>
<div class="flex-1 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg bg-slate-50/30 dark:bg-slate-900/30 flex items-center justify-center transition-colors hover:border-primary/40 hover:bg-primary/5">
<div class="text-center p-6">
<p class="text-slate-400 dark:text-slate-500 text-sm">未选择因子</p>
<p class="text-xs text-slate-400/70 mt-1">从左侧选择分类变量</p>
</div>
</div>
</div>
<div class="flex-1 flex flex-col min-h-0">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-2">
<div class="bg-primary/10 p-1 rounded">
<span class="material-symbols-outlined text-primary text-sm">target</span>
</div>
<h3 class="font-semibold text-slate-800 dark:text-slate-200 text-sm uppercase tracking-wide">目标 (数值变量)</h3>
</div>
<span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">0 已选</span>
</div>
<div class="flex-1 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg bg-slate-50/30 dark:bg-slate-900/30 flex items-start p-2 transition-colors hover:border-primary/40 hover:bg-primary/5">
<div class="w-full h-full flex items-center justify-center">
<div class="text-center p-6">
<p class="text-slate-400 dark:text-slate-500 text-sm">未选择目标</p>
<p class="text-xs text-slate-400/70 mt-1">从左侧选择数值变量</p>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 flex justify-between items-center">
<button class="text-sm font-medium text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
                重置为默认
            </button>
<div class="flex items-center gap-3">
<button class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    取消
                </button>
<button class="px-6 py-2 text-sm font-medium text-white bg-primary hover:bg-primary/90 rounded-lg shadow-sm shadow-primary/30 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">check</span>
                    应用配置
                </button>
</div>
</div>
</div>
</div>

</body></html>
