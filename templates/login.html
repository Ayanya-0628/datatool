<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>登录 - SlyLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Noto Sans SC', sans-serif; } </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-xl font-bold text-slate-800 mb-2">SlyLab</h1>
        <p class="text-slate-500 text-sm mb-6">请登录后使用</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <p class="mb-4 text-sm {{ 'text-red-600' if category == 'error' else 'text-green-600' }}">{{ msg }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('auth.login') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">用户名</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"/>
            </div>
            <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">登录</button>
        </form>
        <p class="mt-4 text-center text-sm text-slate-500">
            还没有账号？ <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">注册</a>
        </p>
    </div>
</body>
</html>
