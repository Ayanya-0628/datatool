<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="多因子方差分析、PCA、聚类分析工具">
    <title>数据分析工具 Pro</title>
    <link rel="stylesheet" href="/static/style.css?v=34">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <!-- 全局拖拽上传遮罩 -->
    <div class="drop-overlay" id="drop-overlay">
        <div class="drop-message">
            <span class="drop-icon">📂</span>
            <span>释放文件以上传</span>
        </div>
    </div>

    <div class="app-container">
        <!-- 左侧设置边栏 -->
        <aside class="settings-sidebar">
            <div class="sidebar-header">
                <div class="app-brand">
                    <span class="logo-icon">📊</span>
                    <span>DataAnalysis</span>
                    <span class="version-badge">2.0</span>
                </div>
            </div>

            <div class="sidebar-content">
                <!-- 1. 数据源 -->
                <div class="sidebar-section">
                    <div class="section-title">数据源</div>

                    <!-- 未上传状态 -->
                    <div id="upload-panel" class="upload-panel">
                        <input type="file" id="file-input" accept=".csv,.xls,.xlsx" hidden>
                        <button class="btn-upload-large" id="upload-btn">
                            <span class="icon">📤</span>
                            <span>点击或拖拽上传数据</span>
                        </button>
                    </div>

                    <!-- 已上传状态 -->
                    <div id="data-info-panel" class="data-info-panel" hidden>
                        <div class="file-card">
                            <div class="file-icon">📄</div>
                            <div class="file-details">
                                <div class="file-name" id="file-name">filename.xlsx</div>
                                <div class="file-meta" id="file-rows">0 行数据</div>
                            </div>
                            <button class="btn-icon-only" id="clear-file" title="清除数据">✕</button>
                        </div>
                    </div>
                </div>

                <!-- 2. 分析方法 (仅当数据加载后显示) -->
                <div class="sidebar-section" id="method-section" hidden>
                    <div class="section-title">分析方法</div>
                    <div class="method-selector">
                        <label class="method-card">
                            <input type="radio" name="analysis-type" value="anova" checked>
                            <div class="card-content">
                                <span class="method-icon">📉</span>
                                <div class="method-info">
                                    <span class="method-name">方差分析</span>
                                    <span class="method-desc">ANOVA + LSD</span>
                                </div>
                            </div>
                        </label>
                        <label class="method-card">
                            <input type="radio" name="analysis-type" value="pca">
                            <div class="card-content">
                                <span class="method-icon">🧬</span>
                                <div class="method-info">
                                    <span class="method-name">主成分分析</span>
                                    <span class="method-desc">PCA 降维</span>
                                </div>
                            </div>
                        </label>
                        <label class="method-card">
                            <input type="radio" name="analysis-type" value="cluster">
                            <div class="card-content">
                                <span class="method-icon">🎯</span>
                                <div class="method-info">
                                    <span class="method-name">聚类分析</span>
                                    <span class="method-desc">K-Means / 层次</span>
                                </div>
                            </div>
                        </label>
                        <label class="method-card">
                            <input type="radio" name="analysis-type" value="heatmap">
                            <div class="card-content">
                                <span class="method-icon">🔥</span>
                                <div class="method-info">
                                    <span class="method-name">相关性热图</span>
                                    <span class="method-desc">Correlation Heatmap</span>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 3. 变量设置 (仅当数据加载后显示) -->
                <div class="sidebar-section" id="variable-section" hidden>
                    <div class="section-title">
                        <span>变量设置</span>
                    </div>

                    <div id="variable-summary" class="variable-summary-text mb-2">
                        已选因子: <span id="summary-factors">0</span>, 已选性状: <span id="summary-targets">0</span>
                    </div>

                    <button id="btn-open-variable-modal" class="btn-secondary btn-block">🛠️ 设置变量</button>

                    <!-- 聚类额外参数 -->
                    <div id="cluster-params" class="params-panel mt-3" hidden>
                        <div class="form-row">
                            <div class="form-group col">
                                <label>聚类数 (K)</label>
                                <input type="number" id="cluster-k" class="form-input" value="3" min="2" max="10">
                            </div>
                            <div class="form-group col">
                                <label>算法</label>
                                <select id="cluster-algorithm" class="form-select">
                                    <option value="kmeans">K-Means</option>
                                    <option value="hierarchical">层次聚类</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group checkbox-group mt-2">
                            <input type="checkbox" id="cluster-use-means">
                            <label for="cluster-use-means">使用分组均值</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部操作栏 -->
            <div class="sidebar-footer" id="action-section" hidden>
                <button class="btn-primary btn-block btn-lg" id="btn-analyze">
                    🚀 开始分析
                </button>
            </div>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="main-content">
            <!-- 空状态 -->
            <div id="empty-state" class="empty-state">
                <div class="empty-illustration">📊</div>
                <h2>开始您的数据分析</h2>
                <p>请在左侧上传数据文件，选择分析方法并配置变量。</p>
            </div>

            <!-- 加载状态 -->
            <div id="loading-section" class="loading-state" hidden>
                <div class="spinner"></div>
                <h3>正在分析数据...</h3>
                <p>请稍候，这可能需要几秒钟</p>
            </div>

            <!-- 结果显示区 -->
            <div id="result-section" class="result-container" hidden>
                <div class="result-header">
                    <h2>分析结果</h2>
                    <div class="header-actions">
                        <div class="save-path-group">
                            <input type="text" id="save-path-input" placeholder="保存路径 (可选)" class="form-input-sm">
                            <button class="btn-outline-sm" id="btn-browse-path">浏览...</button>
                        </div>
                        <button class="btn-outline" id="btn-export">📥 导出 Excel</button>
                    </div>
                </div>

                <!-- 结果 Tabs -->
                <div class="tabs-nav" id="result-tabs-nav">
                    <!-- 动态生成 -->
                </div>

                <!-- 结果内容面板 -->
                <div class="tab-content" id="result-tab-content">
                    <!-- ANOVA 结果 -->
                    <div id="panel-sliced-sep" class="tab-pane active">
                        <div id="sliced-sep-table" class="table-container"></div>
                    </div>
                    <div id="panel-sliced" class="tab-pane">
                        <div id="sliced-table" class="table-container"></div>
                    </div>
                    <div id="panel-main" class="tab-pane">
                        <div id="main-table" class="table-container"></div>
                    </div>
                    <div id="panel-anova" class="tab-pane">
                        <div id="anova-table" class="table-container"></div>
                    </div>
                    <div id="panel-corr" class="tab-pane">
                        <div id="corr-table" class="table-container"></div>
                    </div>

                    <!-- PCA 结果 -->
                    <div id="panel-pca-scree" class="tab-pane">
                        <div id="pca-scree-plot" class="plot-container"></div>
                    </div>
                    <div id="panel-pca-biplot" class="tab-pane">
                        <div class="toolbar biplot-toolbar">
                            <div class="btn-group">
                                <button class="btn-sm active" data-view="2d" id="btn-biplot-2d">2D</button>
                                <button class="btn-sm" data-view="3d" id="btn-biplot-3d">3D</button>
                            </div>
                            <div class="axis-selectors">
                                <select id="biplot-x-select" class="form-select-sm" title="X轴主成分"></select>
                                <select id="biplot-y-select" class="form-select-sm" title="Y轴主成分"></select>
                                <select id="biplot-z-select" class="form-select-sm" hidden title="Z轴主成分"></select>
                            </div>

                            <!-- 新增：分组选择 -->
                            <div class="group-selector" style="margin-left: 8px; border-left: 1px solid #eee; padding-left: 8px;">
                                <label style="font-size: 0.8rem; color: #666;">颜色分组:</label>
                                <select id="biplot-group-select" class="form-select-sm" style="max-width: 100px;">
                                    <option value="">(无)</option>
                                </select>
                            </div>

                            <label class="checkbox-label sm" style="margin-left: 8px;">
                                <input type="checkbox" id="pca-draw-ellipse"> 椭圆
                            </label>
                            <div id="ellipse-options" style="display:inline-flex; gap:5px;" hidden>
                                <input type="range" id="pca-confidence-level" min="50" max="99" value="95" title="置信水平">
                            </div>
                            <button id="btn-update-biplot" class="btn-sm btn-primary">更新</button>
                        </div>
                        <div id="pca-biplot-2d" class="plot-container"></div>
                        <div id="pca-biplot-3d" class="plot-container" hidden></div>
                    </div>
                    <div id="panel-pca-variance" class="tab-pane">
                        <div id="pca-variance-table" class="table-container"></div>
                    </div>
                    <div id="panel-pca-loadings" class="tab-pane">
                        <div id="pca-loadings-table" class="table-container"></div>
                    </div>
                    <div id="panel-pca-scores" class="tab-pane">
                        <div id="pca-scores-table" class="table-container"></div>
                    </div>

                    <!-- 聚类结果 -->
                    <div id="panel-cluster-summary" class="tab-pane">
                        <div id="cluster-summary-content" class="summary-container"></div>
                    </div>
                    <div id="panel-cluster-scatter" class="tab-pane">
                        <div id="cluster-scatter-plot" class="plot-container"></div>
                    </div>
                    <div id="panel-cluster-heatmap" class="tab-pane">
                        <div class="plot-grid">
                             <div id="cluster-corr-heatmap-plot" class="plot-container half"></div>
                             <div id="cluster-heatmap-plot" class="plot-container half"></div>
                        </div>
                    </div>
                    <div id="panel-cluster-data" class="tab-pane">
                        <div class="toolbar">
                             <select id="cluster-filter-select" class="form-select-sm">
                                 <option value="all">全部数据</option>
                             </select>
                             <button id="btn-export-cluster" class="btn-sm btn-outline">导出 CSV</button>
                        </div>
                        <div id="cluster-data-table" class="table-container"></div>
                    </div>
                    <div id="panel-cluster-elbow" class="tab-pane">
                        <button id="btn-elbow" class="btn-sm btn-outline mb-2">生成肘部图</button>
                        <div id="cluster-elbow-plot" class="plot-container"></div>
                    </div>
                </div>
            </div>

            <!-- 热图分析区 (Heatmap Section) -->
            <div id="heatmap-section" class="content-section" hidden>
                <h2>相关性热图分析</h2>

                <!-- Result Area -->
                <div id="heatmap-result">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">热图预览</h5>
                            <div class="btn-group">
                                <button class="btn btn-outline-secondary btn-download-heatmap" data-format="png">下载高清 PNG (600 DPI)</button>
                                <button class="btn btn-outline-secondary btn-download-heatmap" data-format="pdf">下载 PDF (矢量)</button>
                                <button class="btn btn-outline-secondary btn-download-heatmap" data-format="svg">下载 SVG (矢量)</button>
                            </div>
                        </div>
                        <div class="card-body text-center">
                            <img id="heatmap-preview" class="img-fluid" src="" alt="热图预览" style="max-height: 600px;">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Sheet Selection Modal -->
    <div class="modal-overlay" id="sheet-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>选择工作表</h3>
                <button class="close-btn" id="close-modal">×</button>
            </div>
            <div class="modal-body">
                <p class="hint">该文件包含多个工作表，请选择一个：</p>
                <div class="sheet-list" id="sheet-list"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Variable Selection Modal -->
    <div class="modal-overlay" id="variable-modal">
        <div class="modal modal-large">
            <div class="modal-header">
                <h3 id="variable-modal-title">变量选择</h3>
                <button class="close-btn" id="close-variable-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="transfer-container">
                    <!-- Left: Source -->
                    <div class="transfer-panel">
                        <div class="panel-header">可用变量 <span class="badge" id="source-count">0</span></div>
                        <div class="panel-search">
                           <input type="text" id="variable-search" placeholder="搜索变量..." class="form-input-sm">
                        </div>
                        <ul class="transfer-list" id="modal-source-list"></ul>
                    </div>

                    <!-- Middle: Actions -->
                    <div class="transfer-actions" id="modal-actions">
                        <!-- Dynamic Buttons injected by JS -->
                    </div>

                    <!-- Right: Targets -->
                    <div class="transfer-panel-group" id="modal-target-panels">
                        <!-- Dynamic Panels injected by JS (e.g. Factor Panel, Target Panel) -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" id="cancel-variable-modal">取消</button>
                <button class="btn-primary" id="confirm-variable-modal">确认修改</button>
            </div>
        </div>
    </div>

    <!-- Config Modal (for Normalization) -->
    <div class="modal-overlay" id="config-modal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="config-modal-title">变量配置</h3>
                <button class="close-btn" id="close-config-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>指标类型 (正向化)</label>
                    <select id="config-type" class="form-select">
                        <option value="benefit">极大型 (效益型) - 默认</option>
                        <option value="cost">极小型 (成本型)</option>
                        <option value="interval">区间型</option>
                    </select>
                </div>
                <div id="config-interval-params" hidden>
                    <div class="form-row">
                        <div class="form-group col">
                            <label>下限 (a)</label>
                            <input type="number" id="config-a" class="form-input" step="any">
                        </div>
                        <div class="form-group col">
                            <label>上限 (b)</label>
                            <input type="number" id="config-b" class="form-input" step="any">
                        </div>
                    </div>
                    <p class="text-muted small mt-1">最佳区间: [a, b]</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" id="cancel-config-btn">取消</button>
                <button class="btn-primary" id="save-config-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=34"></script>
    <script>
        // 监听页面关闭事件，关闭后端服务
        // 注意：这会导致刷新页面时服务也会关闭。
        // 如果需要刷新，请重新运行 python app.py
        window.addEventListener('beforeunload', function() {
            navigator.sendBeacon('/api/shutdown');
        });
    </script>
</body>
</html>
